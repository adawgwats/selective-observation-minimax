method: robust_group
dataset_root: data/wilds
output_dir: outputs/wilds_civilcomments/smoke_robust_group
model_name: distilbert-base-uncased
max_length: 128
train_batch_size: 4
eval_batch_size: 8
learning_rate: 1.0e-5
weight_decay: 0.01
num_train_epochs: 1
seed: 17
download: true
train_fraction: 0.001
val_fraction: 0.001
test_fraction: 0.001
max_train_examples: 64
max_val_examples: 64
max_test_examples: 64
explicit_mnar: true
base_observation_rate: 0.95
toxic_penalty: 0.20
identity_penalty: 0.10
identity_toxic_interaction_penalty: 0.15
min_observation_rate: 0.05
